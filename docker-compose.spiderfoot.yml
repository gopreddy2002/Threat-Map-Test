services:
  spiderfoot:
    build:
      context: ./spiderfoot
    restart: unless-stopped
    ports:
      - "127.0.0.1:5001:5001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5001/ping', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
